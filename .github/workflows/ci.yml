name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pre-commit
        run: python -m pip install --user pre-commit==4.2.0

      - name: pre-commit checks (shellcheck + hygiene)
        # Runs the same hooks as local `mise run validate`.
        # gitleaks is skipped here — the secret-scan job handles full-history
        # scanning via gitleaks-action which is more thorough.
        run: SKIP=gitleaks python -m pre_commit run --all-files

      - name: Validate compose (default profile — no optional services)
        run: |
          COMPOSE_PROFILES=none \
          WAKAPI_SALT=ci \
          WAKAPI_PUBLIC_URL=https://wakapi.example.com \
          CF_TUNNEL_TOKEN=ci \
          docker compose --env-file .env.example config -q

      - name: Validate compose (all profiles)
        run: |
          COMPOSE_PROFILES=tunnel,autoupdate \
          WAKAPI_SALT=ci \
          WAKAPI_PUBLIC_URL=https://wakapi.example.com \
          CF_TUNNEL_TOKEN=ci \
          docker compose --env-file .env.example config -q

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0        # full history so gitleaks scans all commits

      - name: Gitleaks
        # Note: gitleaks-action requires a GITLEAKS_LICENSE for org repos.
        # For a personal public repo this runs free.
        # If moving to an org, replace with the CLI step below instead:
        #   run: |
        #     curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz | tar xz
        #     ./gitleaks detect --source . --log-opts "--all"
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
