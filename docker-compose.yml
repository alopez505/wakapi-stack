# =============================================================================
#  Wakapi self-hosted coding-stats stack
# -----------------------------------------------------------------------------
#  WakaTime-compatible backend (https://github.com/muety/wakapi) behind an
#  optional Cloudflare Tunnel. Runs anywhere Docker runs — bare metal, VM,
#  homelab, or Docker Engine inside WSL2.
#
#  Everything personal lives in .env (gitignored). This file is safe to publish.
#
#  Quick start:
#    mise run init     # creates .env with a generated salt
#    # edit .env: ROLE=host, WAKAPI_PUBLIC_URL, CF_TUNNEL_TOKEN if using tunnel
#    mise run up       # docker compose up -d
#
#  Profiles (set COMPOSE_PROFILES in .env, comma-separated):
#    (none)       just Wakapi — reachable locally on 127.0.0.1:PORT
#    tunnel       adds cloudflared  -> public HTTPS, no open inbound ports
#    autoupdate   adds watchtower   -> pulls new images daily (optional)
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  #  Wakapi  —  always runs
  # ---------------------------------------------------------------------------
  wakapi:
    image: ghcr.io/muety/wakapi:${WAKAPI_VERSION:-2.17.4}
    container_name: wakapi
    restart: unless-stopped
    init: true
    environment:
      # Salt for password hashing — generated by mise run init, never commit it
      WAKAPI_PASSWORD_SALT: "${WAKAPI_SALT:?missing WAKAPI_SALT - run: mise run init}"
      WAKAPI_PUBLIC_URL: "${WAKAPI_PUBLIC_URL:-http://localhost:3000}"
      # Keep false after initial registration. Set true temporarily to sign up,
      # then flip back. Leaving true on a public URL is a security risk.
      WAKAPI_ALLOW_SIGNUP: "${WAKAPI_ALLOW_SIGNUP:-false}"
      # Listen on all interfaces inside the container (required for Docker networking)
      WAKAPI_LISTEN_IPV4: "0.0.0.0"
      WAKAPI_LISTEN_IPV6: "-"
      # Cookies: keep Secure cookies for public HTTPS. Set true only for
      # local-only HTTP testing if login cookies do not persist.
      WAKAPI_INSECURE_COOKIES: "${WAKAPI_INSECURE_COOKIES:-false}"
      # Database — SQLite by default; absolute path inside the /data volume.
      # When using Postgres, set WAKAPI_DB_NAME=wakapi in .env.
      WAKAPI_DB_TYPE: "${WAKAPI_DB_TYPE:-sqlite3}"
      WAKAPI_DB_NAME: "${WAKAPI_DB_NAME:-/data/wakapi.db}"
      # Optional Postgres (only used when WAKAPI_DB_TYPE=postgres)
      WAKAPI_DB_HOST: "${WAKAPI_DB_HOST:-}"
      WAKAPI_DB_PORT: "${WAKAPI_DB_PORT:-5432}"
      WAKAPI_DB_USER: "${WAKAPI_DB_USER:-wakapi}"
    volumes:
      - ./data:/data
    # Bound to loopback — not exposed on LAN unless you remove 127.0.0.1:
    ports:
      - "127.0.0.1:${WAKAPI_LOCAL_PORT:-3000}:3000"
    networks:
      - wakapi-net
    # Healthcheck intentionally omitted: current Wakapi images may lack curl/wget,
    # which would make Docker report false "unhealthy" states.
    # ---------------------------------------------------------------------------
    #  OPTIONAL: Traefik integration (requires traefik-local-proxy to be running)
    #  Uncomment the labels block and add proxy to the networks list below,
    #  then also uncomment the proxy external network at the bottom of this file.
    # ---------------------------------------------------------------------------
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.wakapi.rule=Host(`wakapi.localhost`)"
    #   - "traefik.http.routers.wakapi.entrypoints=web"
    #   - "traefik.http.services.wakapi.loadbalancer.server.port=3000"

  # ---------------------------------------------------------------------------
  #  cloudflared  —  Cloudflare Tunnel agent   [profile: tunnel]
  #  Outbound-only. No open inbound ports; origin IP never in public DNS.
  #  Hostname routing (your.domain -> http://wakapi:3000) is configured in
  #  the Cloudflare Zero Trust dashboard — see README.
  # ---------------------------------------------------------------------------
  cloudflared:
    image: cloudflare/cloudflared:${CLOUDFLARED_VERSION:-2026.5.2}
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CF_TUNNEL_TOKEN:?CF_TUNNEL_TOKEN required when COMPOSE_PROFILES includes tunnel}
    networks:
      - wakapi-net
    depends_on:
      - wakapi
    profiles:
      - tunnel

  # ---------------------------------------------------------------------------
  #  watchtower  —  auto-update images daily   [profile: autoupdate]
  #  NOTE: Convenient but pulls updates while you may not be watching.
  #  Prefer manual `mise run pull` for more control.
  # ---------------------------------------------------------------------------
  watchtower:
    image: containrrr/watchtower:${WATCHTOWER_VERSION:-1.7.1}
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --schedule "0 0 4 * * *" --cleanup
    profiles:
      - autoupdate

  # ---------------------------------------------------------------------------
  #  OPTIONAL: Litestream — continuous SQLite backup to S3/R2
  #  1. Copy litestream.yml.example to litestream.yml and configure it
  #  2. Add S3_ACCESS_KEY_ID and S3_SECRET_ACCESS_KEY to .env
  #  3. Uncomment this service
  # ---------------------------------------------------------------------------
  # litestream:
  #   image: litestream/litestream:${LITESTREAM_VERSION:-v0.5.11}
  #   container_name: litestream
  #   restart: unless-stopped
  #   command: replicate
  #   environment:
  #     LITESTREAM_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
  #     LITESTREAM_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
  #   volumes:
  #     - ./data:/data
  #     - ./litestream.yml:/etc/litestream.yml:ro
  #   networks:
  #     - wakapi-net
  #   depends_on:
  #     - wakapi

  # ---------------------------------------------------------------------------
  #  OPTIONAL: Postgres — only if WAKAPI_DB_TYPE=postgres
  # ---------------------------------------------------------------------------
  # wakapi-db:
  #   image: postgres:${POSTGRES_VERSION:-17-alpine}
  #   container_name: wakapi-db
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_DB: ${WAKAPI_DB_NAME:?set WAKAPI_DB_NAME=wakapi when using postgres}
  #     POSTGRES_USER: ${WAKAPI_DB_USER:-wakapi}
  #     POSTGRES_PASSWORD: ${WAKAPI_DB_PASSWORD:?WAKAPI_DB_PASSWORD required for postgres}
  #   volumes:
  #     - ./pgdata:/var/lib/postgresql/data
  #   networks:
  #     - wakapi-net
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U ${WAKAPI_DB_USER:-wakapi}"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

networks:
  wakapi-net:
    name: wakapi-net
  # Uncomment to enable Traefik integration (start traefik-local-proxy first):
  # proxy:
  #   external: true
  #   name: proxy
